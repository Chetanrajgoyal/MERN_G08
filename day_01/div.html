<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>

        #container{
            height: 500px;
            width: 90%;
            margin: auto;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
            padding: 20px;
            background: #cec3c3;
        }
        #container >div{
            width: 12%;
            height: 30%;
            display: flex;
            justify-content: center;
            align-items: center;
            background: rgb(128, 5, 5);
            color: white;
            box-shadow: 3px 3px 10px black;
            border-radius: 50%;
        }

    </style>

</head>
<body>
    <div id="container">
    <div style="font-family: 'Franklin Gothic Medium', 'Arial Narrow', Arial, sans-serif;">This is Div 1</div>
    <div style="font-family: 'Franklin Gothic Medium', 'Arial Narrow', Arial, sans-serif;">This is Div 2</div>
    <div style="font-family: 'Franklin Gothic Medium', 'Arial Narrow', Arial, sans-serif;">This is Div 3</div>
</body>
</html>
